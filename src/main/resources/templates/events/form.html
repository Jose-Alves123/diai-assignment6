<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Event Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="h3 mb-3" th:text="${isEdit} ? 'Edit Event' : 'Create Event'">Event Form</h1>
                    <p class="text-muted" th:text="'Club: ' + ${club.name}">Club context</p>

                      <form th:action="${isEdit} ? @{/clubs/{clubId}/events/{eventId}/edit(clubId=${club.id},eventId=${event.id})} : @{/clubs/{clubId}/events(clubId=${club.id})}"
                          th:object="${eventForm}" method="post" novalidate>
                        <input th:if="${isEdit}" type="hidden" name="_method" value="put">

                        <div class="mb-3">
                            <label for="name" class="form-label">Name *</label>
                            <input id="name" type="text" class="form-control" th:field="*{name}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>
                        </div>

                        <div class="mb-3">
                            <label for="date" class="form-label">Date *</label>
                            <input id="date" type="date" class="form-control" th:field="*{date}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('date')}" th:errors="*{date}">Date error</div>
                        </div>

                        <div class="mb-3">
                            <label for="type" class="form-label">Type *</label>
                            <select id="type" class="form-select" th:field="*{type}">
                                <option value="">Select a type</option>
                                <option th:each="typeOption : ${types}" th:value="${typeOption.name}" th:text="${typeOption.name}">WORKSHOP</option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('type')}" th:errors="*{type}">Type error</div>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input id="location" type="text" class="form-control" th:field="*{location}">
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea id="description" class="form-control" rows="4" th:field="*{description}"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update Event' : 'Create Event'">Save</button>
                            <a class="btn btn-outline-secondary" th:href="@{/clubs/{clubId}(clubId=${club.id})}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
