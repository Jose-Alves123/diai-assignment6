<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Clubs')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Campus Clubs</h1>
        <a class="btn btn-outline-primary" th:href="@{/events}">Browse All Events</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Events</th>
                    <th>Description</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="club : ${clubs}">
                    <td>
                        <a th:href="@{/clubs/{clubId}(clubId=${club.id})}" th:text="${club.name}">Club Name</a>
                    </td>
                    <td th:text="${club.category}">CATEGORY</td>
                    <td th:text="${eventCounts[club.id] ?: 0}">0</td>
                    <td>
                        <details>
                            <summary>Show description</summary>
                            <span th:text="${club.description}">Description</span>
                        </details>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
